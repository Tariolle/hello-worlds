# TCP-Graph-JEPA — graph-based masked-latent JEPA for EEG anomaly detection.
# Self-supervised on NORMAL TUAB windows; anomaly = latent unpredictability.
# Run:
#   python -m archive.graph_jepa.v2.scripts.train_graph_jepa --config archive/graph_jepa/v2/config.yaml
# Override any leaf from the CLI, e.g.  data.data_root=/path  model.hidden_dim=256

meta:
  seed: 1
  ckpt_dir: ./checkpoints/graph_jepa
  stat_windows: 512        # windows used to fit feature normalisation (train-only)
  eval_during: true        # compute eval AUROC during training (needs eval split)
  eval_every: 5
  eval_max_files: 80        # cap eval files during training for speed

data:
  # OVERRIDE on the cluster to the TUAB_PREPROCESSED path.
  data_root: /lustre/work/pdl17890/udl806719/datasets/Neuro/TUAB-TUEV/TUAB_PREPROCESSED
  split: train
  source: edf              # edf | tensor | synthetic
  # 22 TCP bipolar channels are the default (omitted -> archive.graph_jepa.v2.core.TCP_CHANNELS)
  sfreq: 200
  window_sec: 7.0          # -> T = 70 frames at frame_sec=0.1
  frame_sec: 0.1
  feature_method: filter   # filter (band envelope) | welch
  notch_hz: 60.0           # US line noise; null to disable
  zscore_raw: true
  bands:                    # log-bandpower bands (feature_dim = 5)
    delta: [0.5, 4.0]
    theta: [4.0, 8.0]
    alpha: [8.0, 13.0]
    beta: [13.0, 30.0]
    gamma: [30.0, 70.0]
  epoch_size: 4000         # virtual SSL windows per epoch
  n_windows: 8             # evenly-spaced windows per recording (eval/file mode)
  batch_size: 64
  num_workers: 16
  frac: 1.0
  ssl_classes: [normal]    # pretrain on NORMAL only (set [normal, abnormal] for all-data)
  label_scheme: tuab       # eval: normal=0 / abnormal=1

model:
  hidden_dim: 128
  feature_dim: 5           # overridden to match the bands above
  temporal: transformer    # transformer | gru | tcn
  n_temporal_layers: 2
  n_heads: 4
  n_graph_layers: 2
  dropout: 0.1
  predictor_hidden: 128
  target_mode: ema         # ema | shared
  ema_decay: 0.996
  loss: smooth_l1          # smooth_l1 | l1 | mse
  use_shared: true
  use_contralateral: true
  use_self_loops: true

mask:
  mode: random             # random | channel | contralateral | mixed
  mask_ratio: 0.25
  span_frac: 0.5
  channel_frac: 0.3

scoring:
  n_masks: 8
  mask_ratio: 0.5
  mask_mode: random
  window_agg: top_k_mean   # mean | max | top_k_mean
  file_agg: top_k_mean
  top_k_frac: 0.1

optim:
  lr: 0.001
  weight_decay: 0.000001
  epochs: 15
