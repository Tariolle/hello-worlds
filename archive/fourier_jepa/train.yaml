# Fourier-JEPA SSL pretraining config.
# Same two-view SSL objective and probe as cfgs/train.yaml, but the encoder is the
# STFT spectral-stem FourierEEGEncoder1D (model.encoder.type=fourier) instead of
# the strided-conv EEGEncoder1D. Matched head-to-head with the conv SIGReg-ambient
# baseline (cfgs/train.yaml): identical seed / data / objective / probe, so the
# only difference is the encoder front-end.
#
# Run:  python -m examples.eeg.main --fname archive/fourier_jepa/train.yaml

meta:
  seed: 1
  ckpt_dir: ./checkpoints/eeg_fourier_sigreg_ambient

data:
  # OVERRIDE on the cluster to the TUAB_PREPROCESSED path on Dalia.
  data_root: /lustre/work/pdl17890/udl806719/datasets/Neuro/TUAB-TUEV/TUAB_PREPROCESSED
  split: train
  n_channels: 19
  sfreq: 200
  window_sec: 10.0
  epoch_size: 20000      # virtual SSL samples per epoch
  n_windows: 16          # probe mode only
  batch_size: 256
  num_workers: 16
  frac: 1.0
  label_scheme: tuab
  class_names:
  aug_noise_std: 0.1
  aug_scale_jitter: 0.2
  aug_chan_drop_p: 0.2
  aug_time_mask_frac: 0.2

model:
  n_channels: 19
  encoder:
    type: fourier                 # archived STFT spectral-stem exploration (see encoder.py)
    n_fft: 128                    # 65 freq bins (0-100 Hz @ 200 Hz), ~1.56 Hz resolution
    hop: 32                       # T=2000 -> T'=63 STFT frames (> d_cov=32 -> full-rank cov)
    d_model: 256
    d_cov: 32
    d_hidden: 256                 # width of the spectral-mix + temporal blocks
    n_temporal_layers: 2
    kernel: 3
  ssl:
    reg_type: sigreg              # vicreg | sigreg | peira  (matched to the conv baseline)
    reg_space: ambient            # ambient | tangent
    proj: "512-512-256"
    # sigreg (BCS)
    num_slices: 256
    lmbd: 10.0
    # vicreg
    std_coeff: 1.0
    cov_coeff: 1.0
    # peira
    lam: 0.1

optim:
  lr: 0.001
  weight_decay: 0.000001
  epochs: 30
