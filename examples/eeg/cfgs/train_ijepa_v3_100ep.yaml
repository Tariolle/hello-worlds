# I-JEPA v3 100 epochs — identique a v3 sauf epochs=100 et ckpt_dir different.
# v3 (50ep) loss encore decroissante a ep49 -> 100ep pour convergence complete.

meta:
  seed: 1
  ckpt_dir: ./checkpoints/eeg_ijepa_v3_100ep

data:
  data_root: /lustre/work/pdl17890/udl806719/datasets/Neuro/TUAB-TUEV/TUAB_PREPROCESSED
  tuev_root: /lustre/work/pdl17890/udl806719/datasets/Neuro/TUAB-TUEV/TUEV_RAW_DATA
  split: train
  n_channels: 19
  sfreq: 200
  window_sec: 10.0
  epoch_size: 20000
  tuev_epoch_size: 5000
  n_windows: 16
  batch_size: 256
  num_workers: 16
  aug_noise_std: 0.05
  aug_scale_jitter: 0.1
  aug_chan_drop_p: 0.1
  aug_time_mask_frac: 0.05

model:
  n_channels: 19
  encoder:
    widths: [64, 128, 128, 256]
    d_model: 256
    d_cov: 32
    kernel: 7
    stride: 2
    pool_type: mean
  ssl:
    mask_ratio: 0.4
    freq_mask_p: 0.0
    pred_hidden: 512
    bcs_weight: 0.5
    num_slices: 256
    lmbd: 10.0
    proj: "512-512-256"

optim:
  lr: 0.001
  weight_decay: 0.000001
  epochs: 100
  warmup_epochs: 5
  ema_momentum: 0.996
