# EEG World Model pretraining on TUEV.
# 3-geometry JEPA: predict next 1-second window in Euclidean + Tangent + Riemannian spaces.
#
# Anti-collapse per head:
#   ambient  → SIGReg (BCS)   — Gaussian assumption in Euclidean space
#   tangent  → PEIRA           — distribution-free for non-Gaussian SPD tangent vectors
#   riemannian → VICReg        — on log-SPD projected features

meta:
  seed: 1
  ckpt_dir: ./checkpoints/eeg_tuev_wm

data:
  data_root: /lustre/work/pdl17890/udl806719/datasets/Neuro/TUAB-TUEV/TUEV_RAW_DATA
  split: train
  n_channels: 19
  sfreq: 200
  window_sec: 1.0       # 1 s = 200 samples @ 200 Hz; wm_ssl returns 2 consecutive windows
  epoch_size: 20000
  n_windows: 1
  batch_size: 256
  num_workers: 16
  aug_noise_std: 0.1
  aug_scale_jitter: 0.2
  aug_chan_drop_p: 0.2
  aug_time_mask_frac: 0.2

model:
  n_channels: 19
  encoder:
    widths: [64, 128, 128, 256]
    d_model: 256
    d_cov: 8          # 8 < T'=13 (200 / 2^4 = 12.5) — keeps temporal cov full-rank
    kernel: 7
    stride: 2
  ssl:
    # World model loss weight (prediction) vs anti-collapse loss weight
    wm_weight: 1.0
    ssl_weight: 1.0
    # Shared projector spec for all 3 heads
    proj: "512-512-256"
    # Ambient head: SIGReg (BCS)
    num_slices: 256
    lmbd: 10.0
    # Tangent head: PEIRA
    lam: 0.1
    # Riemannian head: VICReg
    std_coeff: 1.0
    cov_coeff: 1.0

optim:
  lr: 0.001
  weight_decay: 0.000001
  epochs: 30
