# JEPA ablation — two-view (current default)
#
# Context: masked v1  →  predictor  →  z_pred
# Target:  EMA(v2)   →  z_tgt          (v2 = different augmentation of same window)
# Loss: MSE(z_pred, z_tgt) + BCS(z_ctx, z_v2)
#
# Ablation pair:
#   two-view (this)  → learns masked prediction + augmentation invariance
#   single-view      → learns masked prediction only (train_jepa_ablation_1view.yaml)

meta:
  seed: 42
  ckpt_dir: ./checkpoints/eeg_jepa_abl_2view

data:
  data_root: /lustre/work/pdl17890/udl806719/datasets/Neuro/TUAB-TUEV/TUAB_PREPROCESSED
  split: train
  n_channels: 19
  sfreq: 200
  window_sec: 10.0
  epoch_size: 20000
  n_windows: 16
  batch_size: 256
  num_workers: 16
  aug_noise_std: 0.05
  aug_scale_jitter: 0.1
  aug_chan_drop_p: 0.1
  aug_time_mask_frac: 0.05

model:
  n_channels: 19
  encoder:
    widths: [64, 128, 128, 256]
    d_model: 256
    d_cov: 32
    kernel: 7
    stride: 2
    pool_type: mean
  ssl:
    single_view: false          # two-view: target = EMA(v2)
    mask_ratio: 0.4
    freq_mask_p: 0.0
    pred_hidden: 512
    bcs_weight: 0.5
    num_slices: 256
    lmbd: 10.0
    proj: "512-512-256"

optim:
  lr: 0.001
  weight_decay: 0.000001
  epochs: 30
  warmup_epochs: 3
  ema_momentum: 0.996
