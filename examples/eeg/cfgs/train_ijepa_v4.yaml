# EEG I-JEPA v4 — cross-corpus TUAB+TUEV + attention pooler
#
# Combine les deux effets positifs identifies :
#   v3 : TUAB+TUEV             -> 0.834 (cross-corpus seul)
#   v2 : attn pool             -> 0.816 (attn seul, sans cross-corpus)
#   v4 : TUAB+TUEV + attn pool -> ?
#
# Hypothese : l'attention pooler est bon (eff_rank=62 vs 58) mais avait besoin
# de plus de donnees pour apprendre a ponderer les bons instants temporels.
# Avec TUEV (crises, artefacts, decharges focales), les bursts a haut SNR sont
# plus frequents -> le pooler peut apprendre a les cibler.

meta:
  seed: 1
  ckpt_dir: ./checkpoints/eeg_ijepa_v4

data:
  data_root: /lustre/work/pdl17890/udl806719/datasets/Neuro/TUAB-TUEV/TUAB_PREPROCESSED
  tuev_root: /lustre/work/pdl17890/udl806719/datasets/Neuro/TUAB-TUEV/TUEV_RAW_DATA
  split: train
  n_channels: 19
  sfreq: 200
  window_sec: 10.0
  epoch_size: 20000
  tuev_epoch_size: 5000
  n_windows: 16
  batch_size: 256
  num_workers: 16
  aug_noise_std: 0.05
  aug_scale_jitter: 0.1
  aug_chan_drop_p: 0.1
  aug_time_mask_frac: 0.05

model:
  n_channels: 19
  encoder:
    widths: [64, 128, 128, 256]
    d_model: 256
    d_cov: 32
    kernel: 7
    stride: 2
    pool_type: attn             # attention pooler (v2 improvement)
  ssl:
    mask_ratio: 0.4
    freq_mask_p: 0.0            # pas de freq masking (a confirmer separement)
    pred_hidden: 512
    bcs_weight: 0.5
    num_slices: 256
    lmbd: 10.0
    proj: "512-512-256"

optim:
  lr: 0.001
  weight_decay: 0.000001
  epochs: 50
  warmup_epochs: 5
  ema_momentum: 0.996
