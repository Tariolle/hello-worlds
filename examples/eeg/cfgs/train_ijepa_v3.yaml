# EEG I-JEPA v3 — pretraining cross-corpus TUAB + TUEV
#
# Objectif : isoler l'effet du volume de donnees (TUAB + TUEV)
#             sans changer autre chose (meme archi que v1 = avg pool, pas de freq mask).
#
# TUEV ajoute ~600 sessions cliniques longues (7-40 min) avec des evenements
# epileptiques, artefacts oculaires, decharges focales — exactement la diversite
# qui devrait generaliser sur TUAB eval.
#
# Comparaison directe :
#   v1 : TUAB seul  → 0.828 balanced_acc
#   v3 : TUAB+TUEV  → ?    (meme modele, plus de donnees)

meta:
  seed: 1
  ckpt_dir: ./checkpoints/eeg_ijepa_v3

data:
  data_root: /lustre/work/pdl17890/udl806719/datasets/Neuro/TUAB-TUEV/TUAB_PREPROCESSED
  tuev_root: /lustre/work/pdl17890/udl806719/datasets/Neuro/TUAB-TUEV/TUEV_RAW_DATA
  split: train
  n_channels: 19
  sfreq: 200
  window_sec: 10.0
  epoch_size: 20000          # TUAB virtual size per epoch
  tuev_epoch_size: 5000      # TUEV virtual size per epoch (~20% du batch)
  n_windows: 16
  batch_size: 256
  num_workers: 16
  aug_noise_std: 0.05
  aug_scale_jitter: 0.1
  aug_chan_drop_p: 0.1
  aug_time_mask_frac: 0.05

model:
  n_channels: 19
  encoder:
    widths: [64, 128, 128, 256]
    d_model: 256
    d_cov: 32
    kernel: 7
    stride: 2
    pool_type: mean            # avg pool — meme que v1 pour isoler l'effet data
  ssl:
    mask_ratio: 0.4
    freq_mask_p: 0.0           # pas de freq masking — meme que v1
    pred_hidden: 512
    bcs_weight: 0.5
    num_slices: 256
    lmbd: 10.0
    proj: "512-512-256"

optim:
  lr: 0.001
  weight_decay: 0.000001
  epochs: 50
  warmup_epochs: 5
  ema_momentum: 0.996
