# EEG-JEPA SSL pretraining config.
# Ladder: flip model.ssl.{reg_type,reg_space} to move between rungs.
#   Rung 0  reg_type=sigreg  reg_space=ambient   (Laya-like baseline)
#   Rung 1  reg_type=sigreg  reg_space=tangent   (geometry-aware SIGReg)
#   Rung 2  reg_type=peira   reg_space=tangent   (distribution-free anti-collapse)
# Reference arms: reg_type=vicreg (eb_jepa default), reg_space=ambient.

meta:
  seed: 1
  ckpt_dir: ./checkpoints/eeg_ambient_sigreg

data:
  # OVERRIDE on the cluster to the TUAB_PREPROCESSED path on Dalia.
  data_root: /lustre/work/pdl17890/udl806719/datasets/Neuro/TUAB-TUEV/TUAB_PREPROCESSED
  split: train
  n_channels: 19
  sfreq: 200
  window_sec: 10.0
  epoch_size: 20000      # virtual SSL samples per epoch
  n_windows: 16          # probe mode only
  batch_size: 256
  num_workers: 16
  frac: 1.0              # SSL: fraction of train recordings (pretrain-data-efficiency sweep)
  aug_noise_std: 0.1
  aug_scale_jitter: 0.2
  aug_chan_drop_p: 0.2
  aug_time_mask_frac: 0.2

model:
  n_channels: 19
  encoder:
    widths: [64, 128, 128, 256]   # 4 stride-2 blocks: T 2000 -> 125
    d_model: 256
    d_cov: 32                     # cov dim for the tangent arm (< T'=125 -> full rank)
    kernel: 7
    stride: 2
  ssl:
    reg_type: sigreg              # vicreg | sigreg | peira
    reg_space: ambient            # ambient | tangent
    proj: "512-512-256"
    # sigreg (BCS)
    num_slices: 256
    lmbd: 10.0
    # vicreg
    std_coeff: 1.0
    cov_coeff: 1.0
    # peira
    lam: 0.1

optim:
  lr: 0.001
  weight_decay: 0.000001
  epochs: 30
