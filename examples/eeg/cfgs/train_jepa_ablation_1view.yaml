# JEPA ablation — single-view
#
# Context: masked v1  →  predictor  →  z_pred
# Target:  EMA(v1)   →  z_tgt          (same window, no masking on target)
# Loss: MSE(z_pred, z_tgt) only — no BCS, collapse prevention via EMA asymmetry
#
# Ablation pair:
#   two-view   → learns masked prediction + augmentation invariance (train_jepa_ablation_2view.yaml)
#   single-view (this)  → learns masked prediction only

meta:
  seed: 42
  ckpt_dir: ./checkpoints/eeg_jepa_abl_1view

data:
  data_root: /lustre/work/pdl17890/udl806719/datasets/Neuro/TUAB-TUEV/TUAB_PREPROCESSED
  split: train
  n_channels: 19
  sfreq: 200
  window_sec: 10.0
  epoch_size: 20000
  n_windows: 16
  batch_size: 256
  num_workers: 16
  aug_noise_std: 0.05
  aug_scale_jitter: 0.1
  aug_chan_drop_p: 0.1
  aug_time_mask_frac: 0.05

model:
  n_channels: 19
  encoder:
    widths: [64, 128, 128, 256]
    d_model: 256
    d_cov: 32
    kernel: 7
    stride: 2
    pool_type: mean
  ssl:
    single_view: true           # single-view: target = EMA(clean v1)
    mask_ratio: 0.4
    freq_mask_p: 0.0
    pred_hidden: 512
    bcs_weight: 0.5             # unused in single_view mode
    num_slices: 256
    lmbd: 10.0
    proj: "512-512-256"

optim:
  lr: 0.001
  weight_decay: 0.000001
  epochs: 30
  warmup_epochs: 3
  ema_momentum: 0.996
